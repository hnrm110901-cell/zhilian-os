name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api-gateway/requirements.txt

      - name: Install dependencies
        run: |
          cd apps/api-gateway
          pip install -r requirements.txt
          pip install flake8 black isort

      - name: Run flake8
        run: |
          cd apps/api-gateway
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check black formatting
        run: |
          cd apps/api-gateway
          black --check src

      - name: Check isort
        run: |
          cd apps/api-gateway
          isort --check-only src

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zhilian_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api-gateway/requirements.txt

      - name: Install dependencies
        run: |
          cd apps/api-gateway
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/zhilian_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
          JWT_SECRET: test-jwt-secret
        run: |
          cd apps/api-gateway
          PYTHONPATH=. pytest tests/ -v --cov=src --cov-report=xml --cov-report=term \
            --ignore=tests/test_agent_integration.py \
            --ignore=tests/test_api_endpoints.py \
            --ignore=tests/test_api_integration.py \
            --ignore=tests/test_backup_service.py \
            --ignore=tests/test_data_import_export_service.py \
            --ignore=tests/test_federated_learning_service.py \
            --ignore=tests/test_mobile_api.py \
            --ignore=tests/test_oauth_integration.py \
            --ignore=tests/test_realtime_notifications.py \
            --ignore=tests/test_supply_chain_service.py

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./apps/api-gateway/coverage.xml
          flags: backend
          name: backend-coverage

  test-agents:
    name: Test Agent (${{ matrix.agent }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [inventory, private_domain, decision, reservation, training, order, schedule, service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api-gateway/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/api-gateway/requirements.txt

      - name: Run tests
        run: |
          cd packages/agents/${{ matrix.agent }}
          pytest tests/ -v --import-mode=importlib

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run ESLint
        run: |
          cd apps/web
          pnpm run lint

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: |
          cd apps/web
          pnpm run test:coverage

      - name: Build
        run: |
          cd apps/web
          pnpm run build

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./apps/web/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-agents, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api-gateway
          push: false
          tags: zhilian-os/api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
