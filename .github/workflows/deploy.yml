name: Deploy

on:
  push:
    branches: [ main, develop ]

# 同一环境只允许一个部署同时运行
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

# ── 环境变量 ──────────────────────────────────────────────
env:
  SERVER_HOST: 42.194.229.21
  PROD_DIR: /opt/zhilian-os/prod
  STAGING_DIR: /opt/zhilian-os/staging
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api-gateway

jobs:
  # ── 1. 快速健康检查 ─────────────────────────────────────
  pre-deploy-check:
    name: Pre-deploy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          cd apps/api-gateway
          python -m py_compile src/main.py
          echo "✓ Python syntax OK"

      - name: Set up Node / pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install & TypeScript check
        run: |
          pnpm install --frozen-lockfile
          cd apps/web
          npx tsc --noEmit --skipLibCheck
          echo "✓ TypeScript check OK"

  # ── 2. 构建前端 ─────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: |
          cd apps/web
          pnpm run build
        env:
          VITE_API_URL: ${{ github.ref_name == 'main' && 'https://zlsjos.cn' || 'https://staging.zlsjos.cn' }}
          VITE_APP_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/web/dist/
          retention-days: 1

  # ── 3. 构建 Docker 镜像并推到 GHCR ─────────────────────
  build-api-image:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      - name: Build and push API image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api-gateway/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Image info
        run: |
          echo "✓ Image pushed to GHCR"
          echo "  Tags: ${{ steps.meta.outputs.tags }}"
          echo "  Digest: ${{ steps.build.outputs.digest }}"

  # ── 4. 部署到服务器（pull 镜像，不再 build）────────────
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    needs: [build-frontend, build-api-image]
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: apps/web/dist/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TUNXIANGOS }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ── Production 部署（main 分支）──────────────────────
      - name: Deploy backend — Production
        if: github.ref_name == 'main'
        env:
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
        run: |
          ssh root@${{ env.SERVER_HOST }} << ENDSSH
            set -e
            echo "=== [PROD 1/6] Pull latest code ==="
            cd /opt/zhilian-os/prod
            git fetch origin main
            git reset --hard origin/main
            echo "Git HEAD: \$(git log -1 --oneline)"

            echo "=== [PROD 2/6] Stop old supervisor process ==="
            supervisorctl stop tunxiang-os 2>/dev/null || true
            sed -i 's/^autostart=true/autostart=false/' /etc/supervisor/conf.d/tunxiang-os.conf 2>/dev/null || true
            supervisorctl reread 2>/dev/null || true
            supervisorctl update 2>/dev/null || true

            echo "=== [PROD 3/6] Login to GHCR and pull image ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull ${IMAGE_TAG}

            echo "=== [PROD 4/6] Deploy API container (pull only, no build) ==="
            cd /opt/zhilian-os/prod

            # 更新 compose 使用 GHCR 镜像
            export API_IMAGE="${IMAGE_TAG}"

            # 停旧容器 + 启动新容器
            docker rm -f zhilian-api 2>/dev/null || true
            docker compose \
              --env-file .env.prod \
              -f docker-compose.prod.yml \
              up -d --no-deps --no-build api-gateway

            echo "=== [PROD 5/6] Wait for API ready ==="
            HEALTHY=0
            for i in \$(seq 1 30); do
              RESP=\$(curl -sf http://127.0.0.1:8000/api/v1/ready 2>/dev/null || echo '{}')
              if echo "\$RESP" | grep -q '"ready"'; then
                echo "API ready after \${i}x3s"
                HEALTHY=1
                break
              fi
              echo "  waiting... (\$i/30)"
              sleep 3
            done
            if [ "\$HEALTHY" = "0" ]; then
              echo "API failed to become ready"
              docker logs zhilian-api --tail 80 2>&1 || true
              exit 1
            fi

            echo "=== [PROD 6/6] Restart Celery + cleanup ==="
            docker compose \
              --env-file .env.prod \
              -f docker-compose.prod.yml \
              up -d --no-deps --no-build celery-worker celery-beat \
              && echo "✓ Celery containers restarted" \
              || echo "⚠ Celery restart warning"

            # 清理旧镜像（关键：防止磁盘堆积）
            docker image prune -f

            docker ps --filter "name=zhilian" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          ENDSSH

      # ── Staging 部署（develop 分支）──────────────────────
      - name: Deploy backend — Staging
        if: github.ref_name == 'develop'
        env:
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
        run: |
          ssh root@${{ env.SERVER_HOST }} << ENDSSH
            set -e
            STAGING_DIR="/opt/zhilian-os/staging"

            echo "=== [STAGING 1/5] Ensure staging directory ==="
            if [ ! -d "\$STAGING_DIR" ]; then
              mkdir -p /opt/zhilian-os
              git clone --branch develop https://github.com/hnrm110901-cell/zhilian-os.git "\$STAGING_DIR"
            fi

            echo "=== [STAGING 2/5] Pull latest develop ==="
            cd "\$STAGING_DIR"
            git fetch origin develop
            git reset --hard origin/develop
            echo "Git HEAD: \$(git log -1 --oneline)"

            echo "=== [STAGING 3/5] Pull image and deploy ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull ${IMAGE_TAG}

            docker compose \
              --env-file .env.staging \
              -f docker-compose.staging.yml \
              up -d --no-deps --no-build api-gateway

            echo "=== [STAGING 4/5] Wait for staging API health ==="
            HEALTHY=0
            for i in \$(seq 1 20); do
              if curl -sf http://127.0.0.1:8001/api/v1/health > /dev/null 2>&1; then
                echo "✓ Staging API healthy after \${i}×3s"
                HEALTHY=1
                break
              fi
              echo "  waiting... (\$i/20)"
              sleep 3
            done
            if [ "\$HEALTHY" = "0" ]; then
              echo "✗ Staging API failed to start"
              docker logs zhilian-api-staging --tail 50 2>&1 || true
              exit 1
            fi

            echo "=== [STAGING 5/5] Run Alembic migrations (staging DB) ==="
            docker exec zhilian-api-staging \
              python -m alembic -c /app/alembic.ini upgrade head \
              && echo "✓ Staging migrations applied" \
              || echo "⚠ Staging migration warning"

            docker image prune -f

            docker ps --filter "name=zhilian.*staging\|staging" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || \
            docker ps --filter "name=zhilian-api-staging" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          ENDSSH

      - name: Deploy frontend — rsync dist
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            TARGET_DIR="/var/www/tunxiang/"
          else
            TARGET_DIR="/var/www/tunxiang-staging/"
          fi
          rsync -avz --delete \
            --exclude='.git' \
            apps/web/dist/ \
            root@${{ env.SERVER_HOST }}:${TARGET_DIR}

          ssh root@${{ env.SERVER_HOST }} "nginx -t && nginx -s reload 2>/dev/null || docker restart zhilian-nginx 2>/dev/null || true"

      - name: Smoke test
        run: |
          sleep 5
          if [ "${{ github.ref_name }}" = "main" ]; then
            API_URL="https://${{ env.SERVER_HOST }}/api/v1/ready"
            FRONT_URL="https://${{ env.SERVER_HOST }}/"
            HOST_HEADER="zlsjos.cn"
          else
            API_URL="http://${{ env.SERVER_HOST }}:8001/api/v1/ready"
            FRONT_URL="http://${{ env.SERVER_HOST }}:8081/"
            HOST_HEADER="staging.zlsjos.cn"
          fi

          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" -H "Host: $HOST_HEADER" "$API_URL")
          echo "API health HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠ API returned $HTTP_CODE (expected 200)"
            exit 1
          fi
          echo "✓ API health OK"

          HTTP_FRONT=$(curl -sk -o /dev/null -w "%{http_code}" -H "Host: $HOST_HEADER" "$FRONT_URL")
          echo "Frontend HTTP code: $HTTP_FRONT"
          [ "$HTTP_FRONT" = "200" ] && echo "✓ Frontend serving OK"

      - name: Notify deploy result
        if: always()
        run: |
          ENV_NAME=${{ github.ref_name == 'main' && 'PROD' || 'STAGING' }}
          STATUS="${{ job.status }}"
          COMMIT=$(git log -1 --format="%h %s")
          echo "[$ENV_NAME] Deploy $STATUS: $COMMIT"
          # TODO: 接入企业微信 Webhook 通知
