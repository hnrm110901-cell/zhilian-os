name: Deploy to Staging

on:
  push:
    branches: [ develop ]

# 只允许一个 staging 部署同时运行
concurrency:
  group: staging-deploy
  cancel-in-progress: true   # staging 允许取消，以最新提交为准

jobs:
  # ── 1. 构建前端 ──────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (Staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: |
          cd apps/web
          pnpm run build
        env:
          VITE_API_URL: https://staging.zlsjos.cn
          VITE_APP_ENV: staging

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-staging
          path: apps/web/dist/
          retention-days: 1

  # ── 2. 部署到 staging ────────────────────────────────────────────
  deploy:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    needs: build-frontend
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-staging
          path: apps/web/dist/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TUNXIANGOS }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 42.194.229.21 >> ~/.ssh/known_hosts

      - name: Deploy backend to staging
        run: |
          ssh root@42.194.229.21 << 'ENDSSH'
            set -e
            echo "=== [1/5] Pull develop branch ==="
            cd /opt/zhilian-os-staging
            git fetch origin develop
            git reset --hard origin/develop
            echo "Git HEAD: $(git log -1 --oneline)"

            echo "=== [2/5] Build & start API container (staging, port 8001) ==="
            docker compose \
              --env-file .env.staging \
              -f docker-compose.staging.yml \
              up -d --no-deps --build api-gateway

            echo "=== [3/5] Wait for API health ==="
            HEALTHY=0
            for i in $(seq 1 20); do
              if curl -sf http://127.0.0.1:8001/api/v1/health > /dev/null 2>&1; then
                echo "✓ Staging API healthy after ${i}×3s"
                HEALTHY=1
                break
              fi
              echo "  waiting... ($i/20)"
              sleep 3
            done
            if [ "$HEALTHY" = "0" ]; then
              echo "✗ Staging API failed to start"
              docker logs zhilian-api-staging --tail 50 2>&1 || true
              exit 1
            fi

            echo "=== [4/5] Run Alembic migrations (staging DB) ==="
            docker exec zhilian-api-staging \
              python -m alembic -c /app/alembic.ini upgrade head \
              && echo "✓ Staging migrations applied" \
              || echo "⚠ Migration warning"

            echo "=== [5/5] Restart Celery workers ==="
            docker compose \
              --env-file .env.staging \
              -f docker-compose.staging.yml \
              up -d --no-deps --build celery-worker celery-beat \
              && echo "✓ Staging Celery restarted"

            docker ps --filter "name=zhilian.*staging" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          ENDSSH

      - name: Deploy frontend to staging nginx
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            apps/web/dist/ \
            root@42.194.229.21:/var/www/tunxiang-staging/

          ssh root@42.194.229.21 "nginx -t && nginx -s reload"

      - name: Smoke test staging
        run: |
          sleep 5
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" \
            -H "Host: staging.zlsjos.cn" \
            https://42.194.229.21/api/v1/health)
          echo "Staging API health: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠ Staging API returned $HTTP_CODE"
            exit 1
          fi
          echo "✓ Staging deploy OK"

      - name: Notify staging result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COMMIT=$(git log -1 --format="%h %s")
          echo "Staging deploy $STATUS: $COMMIT"
