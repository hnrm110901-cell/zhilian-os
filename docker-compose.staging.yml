version: '3.8'

# ─────────────────────────────────────────────────────────────────
# Staging 环境 — 类生产、无 HA 复杂度
#
# 设计原则：
#   1. 与 dev 栈端口互不冲突（dev: 5432/6379/6333/3000/8000）
#   2. 无 Nginx — 直连端口，SSL 是生产专属关注点
#   3. 单节点 Redis — Sentinel 仅用于生产 HA
#   4. 独立 DB zhilian_staging — 迁移不影响 dev 数据
#   5. 与生产使用相同 Dockerfile.prod — 确保构建一致性
#
# 快速启动：
#   cp .env.staging.example .env.staging   # 填入真实密钥
#   make staging-up                         # 构建 + 启动（首次 ~2 min）
#   make staging-migrate                    # 执行 Alembic 迁移
#   make staging-health                     # 验证 API 健康
#
# 端口映射：
#   前端    http://localhost:3002
#   API     http://localhost:8001  (Swagger: /docs)
#   PG      localhost:5435  db=zhilian_staging
#   Redis   localhost:6381
#   Qdrant  localhost:6335
# ─────────────────────────────────────────────────────────────────

services:
  # ── 前端服务 ────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    container_name: zhilian-staging-web
    restart: unless-stopped
    ports:
      - "3002:80"
    environment:
      - NODE_ENV=production
    networks:
      - staging-network
    depends_on:
      - api-gateway

  # ── API Gateway ─────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile.prod
    container_name: zhilian-staging-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - APP_ENV=staging
      - DEBUG=False
      - PYTHONPATH=/app:/app/packages
    env_file:
      - .env.staging
    volumes:
      - ./logs:/var/log/zhilian-os
    networks:
      - staging-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Redis（单节点，无 Sentinel）─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zhilian-staging-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    command: redis-server --appendonly yes --requirepass "staging"
    networks:
      - staging-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "staging", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: zhilian-staging-postgres
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_USER=zhilian
      - POSTGRES_PASSWORD=zhilian
      - POSTGRES_DB=zhilian_staging
    volumes:
      - staging-postgres-data:/var/lib/postgresql/data
    networks:
      - staging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhilian"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j 图数据库（本体层）────────────────────────────────────────
  neo4j:
    image: neo4j:5.17-community
    container_name: zhilian-staging-neo4j
    restart: unless-stopped
    ports:
      - "7688:7687"
      - "7475:7474"
    environment:
      NEO4J_AUTH: neo4j/staging_neo4j
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - staging-neo4j-data:/data
    networks:
      - staging-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "staging_neo4j", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Qdrant 向量数据库 ────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: zhilian-staging-qdrant
    restart: unless-stopped
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - staging-qdrant-data:/qdrant/storage
    networks:
      - staging-network
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

networks:
  staging-network:
    driver: bridge

volumes:
  staging-postgres-data:
    driver: local
  staging-neo4j-data:
    driver: local
  staging-qdrant-data:
    driver: local
