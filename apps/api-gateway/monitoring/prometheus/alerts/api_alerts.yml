groups:
  - name: api_alerts
    interval: 30s
    rules:
      # API服务可用性告警
      - alert: APIServiceDown
        expr: up{job="api"} == 0
        for: 1m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "API服务不可用"
          description: "API服务 {{ $labels.instance }} 已经下线超过1分钟"

      # 高错误率告警
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "API错误率过高"
          description: "API错误率超过5%，当前值: {{ $value }}"

      # 响应时间过长告警
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "API响应时间过长"
          description: "P95响应时间超过1秒，当前值: {{ $value }}秒"

      # 高并发告警
      - alert: HighConcurrency
        expr: http_requests_in_progress > 100
        for: 5m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "API并发请求过高"
          description: "当前并发请求数: {{ $value }}"

      # CPU使用率告警
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "CPU使用率过高"
          description: "CPU使用率超过80%，当前值: {{ $value }}"

      # 内存使用率告警
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 / 1024 > 2
        for: 10m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "内存使用过高"
          description: "内存使用超过2GB，当前值: {{ $value }}GB"

  - name: database_alerts
    interval: 30s
    rules:
      # 数据库连接数告警
      - alert: HighDatabaseConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "数据库连接数过高"
          description: "数据库连接数超过80，当前值: {{ $value }}"

      # 数据库慢查询告警
      - alert: SlowQueries
        expr: rate(pg_stat_statements_mean_time_seconds[5m]) > 1
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "数据库存在慢查询"
          description: "平均查询时间超过1秒"

  - name: redis_alerts
    interval: 30s
    rules:
      # Redis内存使用告警
      - alert: HighRedisMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
          service: cache
        annotations:
          summary: "Redis内存使用过高"
          description: "Redis内存使用超过80%"

      # Redis连接数告警
      - alert: HighRedisConnections
        expr: redis_connected_clients > 100
        for: 5m
        labels:
          severity: warning
          service: cache
        annotations:
          summary: "Redis连接数过高"
          description: "Redis连接数超过100，当前值: {{ $value }}"

  - name: celery_alerts
    interval: 30s
    rules:
      # Celery任务失败率告警
      - alert: HighTaskFailureRate
        expr: rate(celery_task_failed_total[5m]) / rate(celery_task_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: worker
        annotations:
          summary: "Celery任务失败率过高"
          description: "任务失败率超过10%"

      # Celery队列积压告警
      - alert: CeleryQueueBacklog
        expr: celery_queue_length > 1000
        for: 10m
        labels:
          severity: warning
          service: worker
        annotations:
          summary: "Celery队列积压"
          description: "队列长度超过1000，当前值: {{ $value }}"

  - name: infrastructure_alerts
    interval: 30s
    rules:
      # Redis 服务不可用
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          service: cache
        annotations:
          summary: "Redis 服务不可用"
          description: "Redis 实例 {{ $labels.instance }} 已下线超过1分钟"

      # 数据库连接池接近耗尽（使用率 > 90%）
      - alert: DBConnectionPoolExhausted
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.9
        for: 5m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "数据库连接池接近耗尽"
          description: "连接池使用率超过90%，当前值: {{ $value | humanizePercentage }}"

      # 磁盘空间不足（剩余 < 20%）
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "磁盘空间不足"
          description: "根分区可用空间低于20%，当前剩余: {{ $value | humanizePercentage }}"

      # 磁盘空间严重不足（剩余 < 10%）
      - alert: CriticalLowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 2m
        labels:
          severity: critical
          service: infrastructure
        annotations:
          summary: "磁盘空间严重不足"
          description: "根分区可用空间低于10%，当前剩余: {{ $value | humanizePercentage }}"

  - name: agent_alerts
    interval: 60s
    rules:
      # Agent 调用错误率过高
      - alert: AgentHighErrorRate
        expr: rate(http_requests_total{endpoint=~"/api/v1/agents/.*", status=~"5.."}[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: agent
        annotations:
          summary: "Agent 错误率过高"
          description: "Agent 接口 5xx 错误率超过10%，当前值: {{ $value }}"

      # Agent 响应超时（P99 > 5s）
      - alert: AgentHighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{endpoint=~"/api/v1/agents/.*"}[5m])) > 5
        for: 5m
        labels:
          severity: warning
          service: agent
        annotations:
          summary: "Agent 响应延迟过高"
          description: "Agent P99 延迟超过5秒，当前值: {{ $value }}秒"
