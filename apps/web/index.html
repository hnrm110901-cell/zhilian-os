<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-mark-v3.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="屯象OS - 餐饮人的好伙伴" />
    <meta name="theme-color" content="#FF6B2C" />
    <!-- 屯象字体: Noto Serif SC(品牌) + Inter(数据) + JetBrains Mono(代码) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script>
      (function () {
        var stored = localStorage.getItem('tunxiang-theme') || localStorage.getItem('zhilian-theme');
        var isDark = stored === 'dark';
        document.documentElement.setAttribute(
          'data-theme',
          isDark ? 'dark' : 'light'
        );
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', isDark ? '#0B1A20' : '#FF6B2C');
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="屯象OS" />
    <title>屯象OS - 餐饮人的好伙伴</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
