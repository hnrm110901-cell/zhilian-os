# =====================================================
# 屯象OS Nginx 多租户路由配置
# 子域名 → X-Tenant-ID Header → FastAPI TenantContext
# =====================================================

upstream web_backend {
    server zhilian-web:80;
}

upstream api_backend {
    server zhilian-api:8000;
}

# ---- 子域名 → 租户ID 映射 ----
map $host $tenant_id {
    changzaiyiqi.zlsjos.cn   brand_czq;
    zuiqianxian.zlsjos.cn    brand_zqx;
    shanggongchu.zlsjos.cn   brand_sgc;
    admin.zlsjos.cn          platform_admin;
    www.admin.zlsjos.cn      platform_admin;
    api.zlsjos.cn            platform_admin;
    www.zlsjos.cn            platform_admin;
    zlsjos.cn                platform_admin;
    default                  platform_admin;
}

# ---- HTTP：强制重定向到 HTTPS ----
server {
    listen 80;
    server_name _;

    # ACME challenge（Let's Encrypt 证书续签支持）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS：平台管理后台 (admin.zlsjos.cn / www.zlsjos.cn) ----
server {
    listen 443 ssl http2;
    server_name admin.zlsjos.cn www.admin.zlsjos.cn www.zlsjos.cn zlsjos.cn;

    include /etc/nginx/conf.d/snippets/ssl-common.conf;
    include /etc/nginx/conf.d/snippets/security-headers.conf;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
        proxy_pass http://api_backend;
    }

    location /api/ {
        proxy_pass         http://api_backend;
        include /etc/nginx/conf.d/snippets/proxy-common.conf;
        proxy_set_header   X-Tenant-ID platform_admin;
    }

    location / {
        proxy_pass         http://web_backend;
        include /etc/nginx/conf.d/snippets/proxy-common.conf;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# ---- HTTPS：商户后台 (*.zlsjos.cn) ----
server {
    listen 443 ssl http2;
    server_name changzaiyiqi.zlsjos.cn zuiqianxian.zlsjos.cn shanggongchu.zlsjos.cn;

    include /etc/nginx/conf.d/snippets/ssl-common.conf;
    include /etc/nginx/conf.d/snippets/security-headers.conf;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /api/ {
        proxy_pass         http://api_backend;
        include /etc/nginx/conf.d/snippets/proxy-common.conf;
        # 核心：注入租户标识，后端 StoreAccessMiddleware 读取
        proxy_set_header   X-Tenant-ID $tenant_id;
    }

    location / {
        proxy_pass         http://web_backend;
        include /etc/nginx/conf.d/snippets/proxy-common.conf;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# ---- HTTPS：API 直接访问 (api.zlsjos.cn) ----
server {
    listen 443 ssl http2;
    server_name api.zlsjos.cn;

    include /etc/nginx/conf.d/snippets/ssl-common.conf;
    include /etc/nginx/conf.d/snippets/security-headers.conf;

    location / {
        proxy_pass         http://api_backend;
        include /etc/nginx/conf.d/snippets/proxy-common.conf;
        proxy_set_header   X-Tenant-ID $tenant_id;
    }
}

# ---- 兜底：未匹配的 Host 返回 444 ----
server {
    listen 443 ssl http2 default_server;
    server_name _;

    include /etc/nginx/conf.d/snippets/ssl-common.conf;

    return 444;
}
