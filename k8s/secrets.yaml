# ============================================================
# Secret 模板 — 敏感信息不提交明文，部署时用 kubectl 命令创建
# 参考命令（将 <value> 替换为实际值后执行）：
#
#   kubectl create secret generic zhilian-secret \
#     --namespace=zhilian-os \
#     --from-literal=DATABASE_URL="postgresql+asyncpg://zhilian:<DB_PASSWORD>@postgres:5432/zhilian_os" \
#     --from-literal=REDIS_URL="redis://:<REDIS_PASSWORD>@redis:6379/0" \
#     --from-literal=SECRET_KEY="<random-32-char-string>" \
#     --from-literal=JWT_SECRET="<random-32-char-string>" \
#     --from-literal=LLM_API_KEY="<deepseek-api-key>" \
#     --from-literal=WECHAT_CORP_SECRET="<wechat-secret>" \
#     --from-literal=FEISHU_APP_SECRET="<feishu-secret>" \
#     --from-literal=POSTGRES_PASSWORD="<DB_PASSWORD>" \
#     --from-literal=REDIS_PASSWORD="<REDIS_PASSWORD>" \
#     --from-literal=NEO4J_PASSWORD="<NEO4J_PASSWORD>"
#
#   kubectl create secret generic zhilian-tls \
#     --namespace=zhilian-os \
#     --from-file=tls.crt=./ssl/fullchain.pem \
#     --from-file=tls.key=./ssl/privkey.pem
# ============================================================
# 此文件仅用于说明，不包含真实值
apiVersion: v1
kind: Secret
metadata:
  name: zhilian-secret
  namespace: zhilian-os
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_WITH_ACTUAL_VALUE"
  REDIS_URL: "REPLACE_WITH_ACTUAL_VALUE"
  SECRET_KEY: "REPLACE_WITH_ACTUAL_VALUE"
  JWT_SECRET: "REPLACE_WITH_ACTUAL_VALUE"
  LLM_API_KEY: "REPLACE_WITH_ACTUAL_VALUE"
  WECHAT_CORP_SECRET: "REPLACE_WITH_ACTUAL_VALUE"
  FEISHU_APP_SECRET: "REPLACE_WITH_ACTUAL_VALUE"
  POSTGRES_PASSWORD: "REPLACE_WITH_ACTUAL_VALUE"
  REDIS_PASSWORD: "REPLACE_WITH_ACTUAL_VALUE"
  NEO4J_PASSWORD: "REPLACE_WITH_ACTUAL_VALUE"
